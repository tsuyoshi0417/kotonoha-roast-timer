<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>言ノ葉 焙煎タイマー</title>
<style>
  :root{
    --bg:#1b1410; --panel:#261c16; --panel2:#2f231b;
    --ink:#f2e8da; --sub:#b29a82; --line:#3d2e23;
    --accent:#cd8a4e; --accent2:#e0a96a; --ok:#7fa86b; --warn:#c96a52;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    padding:14px;max-width:760px;margin:0 auto}
  h1{font-size:18px;font-weight:700;margin:2px 0 2px;letter-spacing:.04em}
  .tag{color:var(--sub);font-size:12px;margin-bottom:12px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .panel.sticky{position:-webkit-sticky;position:sticky;top:6px;z-index:10;
    box-shadow:0 8px 20px rgba(0,0,0,.45)}
  label{display:block;font-size:12px;color:var(--sub);margin:0 0 4px}
  input,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:10px;font-size:16px;font-family:inherit}
  .row{display:flex;gap:10px}.row>div{flex:1}
  .timer{font-variant-numeric:tabular-nums;font-size:60px;font-weight:700;text-align:center;
    letter-spacing:.02em;margin:2px 0 8px;color:var(--accent2)}
  .ctrl{display:flex;gap:10px;margin-bottom:4px}
  button{border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:700;
    color:var(--ink);background:var(--panel2);border:1px solid var(--line);cursor:pointer;flex:1;font-family:inherit}
  button:active{transform:scale(.98)}
  .start{background:var(--ok);border-color:transparent;color:#10180c}
  .start.running{background:var(--warn);color:#fff}
  .reset{flex:.5;background:transparent;color:var(--sub)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  .chip{flex:0 0 auto;padding:11px 16px;font-size:14px;font-weight:600;background:var(--panel2);
    color:var(--ink);border:1px solid var(--line);border-radius:999px}
  .chip.sel{background:var(--accent);color:#1b1207;border-color:transparent}
  .events{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .ev{display:flex;flex-direction:column;align-items:stretch;gap:6px;background:var(--panel2);
    border:1px solid var(--line);border-radius:12px;padding:10px}
  .ev b{font-size:14px}
  .ev .t{font-variant-numeric:tabular-nums;font-size:20px;color:var(--accent2);font-weight:700}
  .ev button{padding:9px;font-size:13px;background:var(--accent);color:#1b1207;border:0}
  .ev input{padding:8px;font-size:15px;text-align:center}
  .ev.done{border-color:var(--accent)}
  .stat{display:flex;justify-content:space-between;font-size:15px;padding:8px 2px;border-bottom:1px solid var(--line)}
  .stat b{color:var(--accent2);font-variant-numeric:tabular-nums}
  .acts{display:flex;gap:10px;margin-top:8px}
  .acts .save{background:var(--accent);color:#1b1207;border:0}
  .toggle{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:13px;margin-top:8px}
  .toggle input{width:auto}
  .hist{font-size:13px;color:var(--sub)}
  .hist div{padding:6px 0;border-bottom:1px solid var(--line)}
  .note{color:var(--sub);font-size:11px;line-height:1.6;margin-top:6px}
  .note b{color:var(--ink)}
  .err{display:none;background:#3a1c16;border:1px solid var(--warn);color:#f6d9cf;
    padding:10px;border-radius:10px;font-size:12px;margin-bottom:12px;white-space:pre-wrap}
</style>
</head>
<body>
  <div class="err" id="err"></div>
  <h1>言ノ葉 焙煎タイマー <span style="color:var(--sub);font-size:12px">v0</span></h1>
  <div class="tag">珈悦（こうえつ）陶器・遠赤外線 250g｜まず焙煎を本物に</div>

  <div class="panel sticky">
    <div class="timer" id="timer">00:00</div>
    <div class="ctrl">
      <button class="start" id="startBtn" type="button">スタート</button>
      <button class="reset" id="resetBtn" type="button">リセット</button>
    </div>
    <div class="toggle"><input type="checkbox" id="beep"><label for="beep" style="margin:0">30秒ごとに音で知らせる</label></div>
  </div>

  <div class="panel">
    <label>温度カーブ（随時更新）</label>
    <canvas id="graph" style="width:100%;height:170px;display:block"></canvas>
    <div style="margin-top:10px"><label>現在温度 (℃)</label><input id="curTemp" type="number" inputmode="decimal" placeholder="まず今の温度を入れる"></div>
    <div class="ctrl" style="margin-top:8px">
      <button type="button" id="p3">＋3℃</button>
      <button type="button" id="p5">＋5℃</button>
      <button type="button" id="p10">＋10℃</button>
    </div>
    <div class="ctrl" style="margin-top:8px">
      <button type="button" id="pNow">この値で記録（針を読んで補正）</button>
    </div>
    <div class="note">上がるごとにタップで点を記録。序盤は＋5/＋10、<b>1ハゼ〜2ハゼの大事な所は＋3</b>で細かく。タップを飛ばすと絶対温度がズレるので、時々「この値で記録」で実測の針を読んで補正。</div>
  </div>

  <div class="panel">
    <div><label>豆（産地/銘柄）</label><input id="bean" list="beanList" autocomplete="off" placeholder="例）エチオピア イルガチェフェ"><datalist id="beanList"></datalist>
      <div class="note" id="beanHint" style="display:none">同じ豆の過去カーブを薄く重ねて表示中（背面）。</div></div>
    <div style="margin-top:10px">
      <label>精製</label>
      <div class="chips" id="procChips">
        <button type="button" class="chip" data-v="ウォッシュト">ウォッシュト</button>
        <button type="button" class="chip" data-v="ナチュラル">ナチュラル</button>
        <button type="button" class="chip" data-v="ハニー">ハニー</button>
        <button type="button" class="chip" data-v="アナエロビック">アナエロビック</button>
        <button type="button" class="chip" data-v="その他">その他</button>
      </div>
      <input id="procOther" style="display:none;margin-top:8px" placeholder="その他の精製を入力">
    </div>
    <div class="row" style="margin-top:10px">
      <div><label>生豆量 (g)</label><input id="green" type="number" inputmode="decimal" value="150"></div>
      <div><label>室温 (℃)</label><input id="room" type="number" inputmode="decimal" value="20"></div>
    </div>
    <div style="margin-top:10px">
      <label>火力</label>
      <div class="chips" id="heatChips">
        <button type="button" class="chip" data-v="弱">弱</button>
        <button type="button" class="chip" data-v="中弱">中弱</button>
        <button type="button" class="chip" data-v="中">中</button>
        <button type="button" class="chip" data-v="中強">中強</button>
        <button type="button" class="chip" data-v="強">強</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <label style="margin-bottom:8px">節目（焼きながらタップ＝その時刻を記録。温度は後から入れてもOK）</label>
    <div class="events" id="events"></div>
  </div>

  <div class="panel">
    <label>焼き上がり</label>
    <div class="row">
      <div><label>焙煎後 (g)</label><input id="roasted" type="number" inputmode="decimal" placeholder="例）126"></div>
    </div>
    <div style="margin-top:10px">
      <div class="stat"><span>重量減%</span><b id="loss">—</b></div>
      <div class="stat"><span>全焙煎時間</span><b id="total">—</b></div>
      <div class="stat"><span>DTR%（発達率）</span><b id="dtr">—</b></div>
    </div>
    <div style="margin-top:10px"><label>メモ（匂い・色・次回への一手）</label><textarea id="memo" rows="2"></textarea></div>
    <div class="acts">
      <button class="save" id="saveBtn" type="button">この焙煎を保存</button>
      <button id="csvBtn" type="button">CSV出力</button>
    </div>
    <div class="note">※保存先＝<b>この端末のブラウザの中だけ（localStorage）</b>。Safariの履歴削除や端末の空き容量不足で<b>消えることがある</b>。だから<b>CSV出力が本当のバックアップ</b>。サーバー・クラウドには一切送らない。</div>
  </div>

  <div class="panel">
    <label>保存した焙煎（新しい順）</label>
    <div class="hist" id="hist">まだ無し</div>
  </div>

<script>
window.onerror=function(m,s,l){var e=document.getElementById("err");if(e){e.style.display="block";e.textContent="エラー: "+m+" ("+l+"行)";}};
(function(){
  "use strict";
  function $(id){return document.getElementById(id);}
  function nn(v){return (v===undefined||v===null)?"":v;}
  function fmt(s){s=Math.max(0,Math.round(s));return ("0"+Math.floor(s/60)).slice(-2)+":"+("0"+(s%60)).slice(-2);}
  function nowSec(){return Date.now()/1000;}
  function num(id){var v=parseFloat($(id).value);return isNaN(v)?null:v;}

  var EVENTS=[
    {key:"charge",name:"投入"},{key:"bottom",name:"中点"},
    {key:"fc",name:"1ハゼ開始"},{key:"fce",name:"1ハゼ終了"},
    {key:"sc",name:"2ハゼ開始"},{key:"drop",name:"煎り止め"}
  ];
  var running=false,t0=0,elapsed=0,tick=null,lastBeep=0,wakeLock=null;
  var marks={},temps={},cards={},selProc="",selHeat="",series=[];

  /* ---- 選択式チップ（精製・火力）---- */
  function getProc(){ if(selProc==="その他"){var o=$("procOther").value;return o?o:"その他";} return selProc; }
  function getHeat(){ return selHeat; }
  function setupChips(containerId, onPick){
    var chips=$(containerId).querySelectorAll(".chip");
    for(var i=0;i<chips.length;i++){(function(c){
      c.addEventListener("click",function(){
        var all=$(containerId).querySelectorAll(".chip");
        for(var j=0;j<all.length;j++)all[j].classList.remove("sel");
        c.classList.add("sel");
        onPick(c.getAttribute("data-v"));
      });
    })(chips[i]);}
  }

  /* ---- 節目カード（押したカードだけ更新＝温度入力を壊さない）---- */
  function renderEvents(){
    var wrap=$("events");wrap.innerHTML="";cards={};
    for(var i=0;i<EVENTS.length;i++){(function(e){
      var done=(marks[e.key]!==undefined);
      var div=document.createElement("div");
      div.className="ev"+(done?" done":"");
      div.innerHTML='<b>'+e.name+'</b><div class="t">'+(done?fmt(marks[e.key]):"—")+'</div>'+
        '<button type="button">'+(done?"記録し直す":"記録")+'</button>'+
        '<input type="number" inputmode="decimal" placeholder="温度℃" value="'+nn(temps[e.key])+'">';
      var btn=div.querySelector("button"), inp=div.querySelector("input");
      btn.addEventListener("click",function(){mark(e.key);});
      inp.addEventListener("input",function(){temps[e.key]=this.value;});
      cards[e.key]={div:div,t:div.querySelector(".t"),btn:btn};
      wrap.appendChild(div);
    })(EVENTS[i]);}
  }
  function mark(key){
    if(key==="charge"){resetTime();marks.charge=0;if(!running)startRun();}
    else{marks[key]=elapsed;if(key==="drop")stopRun();}
    var c=cards[key];
    if(c){c.div.className="ev done";c.t.textContent=fmt(marks[key]);c.btn.textContent="記録し直す";}
    recalc();
  }

  /* ---- タイマー＋画面スリープ防止（Wake Lock）---- */
  function reqWake(){ try{ if("wakeLock" in navigator){ navigator.wakeLock.request("screen").then(function(w){wakeLock=w;}).catch(function(){}); } }catch(e){} }
  function relWake(){ try{ if(wakeLock){ wakeLock.release().catch(function(){}); wakeLock=null; } }catch(e){} }
  function startRun(){running=true;t0=nowSec()-elapsed;lastBeep=Math.floor(elapsed/30);
    tick=setInterval(loop,200);$("startBtn").textContent="一時停止";$("startBtn").classList.add("running");reqWake();}
  function stopRun(){running=false;clearInterval(tick);
    $("startBtn").textContent="再開";$("startBtn").classList.remove("running");relWake();}
  function toggleRun(){if(running)stopRun();else startRun();}
  function resetTime(){elapsed=0;t0=nowSec();$("timer").textContent="00:00";}
  function loop(){
    elapsed=nowSec()-t0;$("timer").textContent=fmt(elapsed);drawGraph();
    if($("beep").checked){var b=Math.floor(elapsed/30);if(b>lastBeep){lastBeep=b;doBeep();}}
  }
  function doBeep(){
    try{var AC=window.AudioContext||window.webkitAudioContext;var a=new AC();
      var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
      o.frequency.value=880;g.gain.value=0.2;o.start();o.stop(a.currentTime+0.12);
      setTimeout(function(){a.close();},300);}catch(e){}
    if(navigator.vibrate)navigator.vibrate(80);
  }
  document.addEventListener("visibilitychange",function(){ if(document.visibilityState==="visible"&&running)reqWake(); });

  /* ---- 集計 ---- */
  function recalc(){
    var g=num("green"),r=num("roasted");
    $("loss").textContent=(g&&r&&g>0)?((g-r)/g*100).toFixed(1)+" %":"—";
    var drop=marks.drop,fc=marks.fc;
    $("total").textContent=(drop!==undefined)?fmt(drop):"—";
    $("dtr").textContent=(drop!==undefined&&fc!==undefined&&drop>0)?((drop-fc)/drop*100).toFixed(1)+" %":"—";
  }
  function resetAll(){
    if(!confirm("今の入力を全部消して新しい焙煎を始める？"))return;
    stopRun();elapsed=0;marks={};temps={};
    $("bean").value="";$("roasted").value="";$("memo").value="";
    $("green").value="150";$("room").value="20";
    selProc="";$("procOther").value="";$("procOther").style.display="none";
    selHeat="";
    var all=document.querySelectorAll(".chip");for(var k=0;k<all.length;k++)all[k].classList.remove("sel");
    series=[];$("curTemp").value="";
    $("timer").textContent="00:00";renderEvents();recalc();onBeanChange();
  }

  /* ---- ロット番号＆ID（同じ豆・同じ日で何回目か＝将来カッピング結果を紐付ける鍵）---- */
  function ymdSafe(d){ // Dateオブジェクト→ローカル日付YYYY-MM-DD（端末のタイムゾーン基準）
    var y=d.getFullYear(),m=("0"+(d.getMonth()+1)).slice(-2),da=("0"+d.getDate()).slice(-2);
    return y+"-"+m+"-"+da;
  }
  function lotFor(bean,day){ // 既存レコードを走査し、同じ豆名・同じ日付の件数＋1を返す
    var list=getList(),n=0,b=String(bean||"");
    for(var i=0;i<list.length;i++){
      if(String(list[i].bean||"")===b && String(list[i].day||"")===day){ n++; }
    }
    return n+1;
  }

  /* ---- 保存・出力（全節目の時刻＋温度を保持）---- */
  function collect(){
    var g=num("green"),r=num("roasted");
    var loss=(g&&r&&g>0)?((g-r)/g*100).toFixed(1):"";
    var drop=marks.drop,fc=marks.fc;
    var dtr=(drop!==undefined&&fc!==undefined&&drop>0)?((drop-fc)/drop*100).toFixed(1):"";
    var now=new Date(), bean=$("bean").value, day=ymdSafe(now), lot=lotFor(bean,day);
    var o={date:now.toLocaleString("ja-JP"),day:day,bean:bean,lot:lot,
      id:String(bean)+"|"+day+"|"+lot,proc:getProc(),
      green:nn(g),roasted:nn(r),loss:loss,room:$("room").value,heat:getHeat(),dtr:dtr,memo:$("memo").value};
    for(var i=0;i<EVENTS.length;i++){var k=EVENTS[i].key;o[k]=nn(marks[k]);o[k+"T"]=nn(temps[k]);}
    o.curve=series.slice();
    return o;
  }
  function getList(){try{return JSON.parse(localStorage.getItem("cotonoha_roasts")||"[]");}catch(e){return [];}}

  /* ---- 豆名オートコンプリート（過去レコードのユニーク一覧）---- */
  function refreshBeanList(){
    var dl=$("beanList"); if(!dl)return;
    var list=getList(),seen={},names=[];
    for(var i=0;i<list.length;i++){
      var b=String(list[i].bean||"");
      if(b!==""&&!seen[b]){seen[b]=1;names.push(b);}
    }
    dl.innerHTML="";
    for(var j=0;j<names.length;j++){var op=document.createElement("option");op.value=names[j];dl.appendChild(op);}
  }
  function saveRoast(){var list=getList();list.unshift(collect());
    try{localStorage.setItem("cotonoha_roasts",JSON.stringify(list));}catch(e){}
    renderHist();refreshBeanList();onBeanChange();alert("保存した（この端末内）。バックアップはCSV出力で。");}
  function renderHist(){
    var list=getList(),h=$("hist");
    if(!list.length){h.textContent="まだ無し";return;}
    var out="";for(var i=0;i<Math.min(12,list.length);i++){var x=list[i];
      var lotLabel=(x.lot!==undefined&&x.lot!==null&&x.lot!=="")?("#"+x.lot):"";
      out+='<div>'+x.date+'｜'+(x.bean||"(豆名なし)")+(lotLabel?" "+lotLabel:"")+'｜減'+(x.loss||"-")+'%｜DTR'+(x.dtr||"-")+'%</div>';}
    h.innerHTML=out;
  }
  function exportCSV(){
    var rows=[collect()].concat(getList());
    var head=["日付","豆","ロット","ID","精製","生豆量g","焙煎後g","重量減%","室温","火力"];
    for(var i=0;i<EVENTS.length;i++){head.push(EVENTS[i].name+"[秒]");head.push(EVENTS[i].name+"温度");}
    head.push("DTR%");head.push("メモ");
    var lines=[head.join(",")];
    for(var r=0;r<rows.length;r++){var x=rows[r];
      var row=[x.date,x.bean,nn(x.lot),nn(x.id),x.proc,x.green,x.roasted,x.loss,x.room,x.heat];
      for(var i=0;i<EVENTS.length;i++){row.push(x[EVENTS[i].key]);row.push(x[EVENTS[i].key+"T"]);}
      row.push(x.dtr);row.push(String(x.memo||"").replace(/[\n,]/g," "));
      lines.push(row.join(","));}
    var blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="焙煎ログ_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }

  /* ---- 温度カーブ ---- */
  function recordPoint(temp){
    if(temp===null||isNaN(temp))return;
    series.push({t:Math.round(elapsed),temp:temp});
    $("curTemp").value=temp; drawGraph();
  }
  function addTemp(d){ var v=parseFloat($("curTemp").value); if(isNaN(v)){alert("先に今の温度を入れてね");return;} recordPoint(v+d); }
  /* 入力中の豆名と同じ過去焙煎のカーブ一覧（背面に薄く描く用）。curveが2点以上ある物だけ。 */
  function pastCurves(){
    var b=String(($("bean")&&$("bean").value)||""); if(b==="")return [];
    var list=getList(),out=[];
    for(var i=0;i<list.length;i++){
      var rec=list[i];
      if(String(rec.bean||"")===b && rec.curve && rec.curve.length>1){ out.push(rec.curve); }
    }
    return out;
  }
  function drawGraph(){
    var c=$("graph"); if(!c||!c.getContext)return;
    var dpr=window.devicePixelRatio||1, cssW=c.clientWidth||300, cssH=170;
    c.width=Math.round(cssW*dpr); c.height=Math.round(cssH*dpr);
    var x=c.getContext("2d"); x.setTransform(dpr,0,0,dpr,0,0); x.clearRect(0,0,cssW,cssH);
    var padL=36,padR=8,padT=8,padB=18, pW=cssW-padL-padR, pH=cssH-padT-padB, i, j;
    var past=pastCurves();
    var maxT=1,minY=999,maxY=-999;
    /* 現在カーブで範囲を取る */
    for(i=0;i<series.length;i++){ if(series[i].t>maxT)maxT=series[i].t; if(series[i].temp<minY)minY=series[i].temp; if(series[i].temp>maxY)maxY=series[i].temp; }
    /* 過去カーブも範囲に含める（過去＋現在を自動スケール）*/
    for(j=0;j<past.length;j++){ var cv=past[j];
      for(i=0;i<cv.length;i++){ var p=cv[i]; if(p.t>maxT)maxT=p.t; if(p.temp<minY)minY=p.temp; if(p.temp>maxY)maxY=p.temp; }
    }
    if(elapsed>maxT)maxT=elapsed;
    if(series.length===0&&past.length===0){minY=0;maxY=200;}
    if(minY>maxY){minY=0;maxY=200;}
    if(minY===maxY){minY-=5;maxY+=5;}
    x.strokeStyle="#3d2e23"; x.lineWidth=1; x.fillStyle="#b29a82"; x.font="10px sans-serif";
    x.beginPath(); x.moveTo(padL,padT); x.lineTo(padL,padT+pH); x.lineTo(padL+pW,padT+pH); x.stroke();
    x.fillText(Math.round(maxY)+"°",2,padT+8);
    x.fillText(Math.round(minY)+"°",2,padT+pH);
    x.fillText("0:00",padL,cssH-4); x.fillText(fmt(maxT),padL+pW-28,cssH-4);
    function PX(t){return padL+(maxT>0?(t/maxT)*pW:0);}
    function PY(v){return padT+pH-((v-minY)/(maxY-minY))*pH;}
    /* 過去カーブ＝薄い色で背面に */
    for(j=0;j<past.length;j++){ var c2=past[j];
      x.strokeStyle="rgba(224,169,106,.22)"; x.lineWidth=1.5; x.beginPath();
      for(i=0;i<c2.length;i++){ var qx=PX(c2[i].t), qy=PY(c2[i].temp); if(i===0)x.moveTo(qx,qy); else x.lineTo(qx,qy); }
      x.stroke();
    }
    /* 節目ライン（1ハゼ・煎り止め）*/
    var evk=["fc","drop"];
    for(i=0;i<evk.length;i++){ var mk=marks[evk[i]]; if(mk!==undefined){ x.strokeStyle="rgba(205,138,78,.45)"; x.lineWidth=1; x.beginPath(); var xx=PX(mk); x.moveTo(xx,padT); x.lineTo(xx,padT+pH); x.stroke(); } }
    /* 現在カーブ＝濃く前面に */
    if(series.length>0){
      x.strokeStyle="#e0a96a"; x.lineWidth=2; x.beginPath();
      for(i=0;i<series.length;i++){ var px=PX(series[i].t), py=PY(series[i].temp); if(i===0)x.moveTo(px,py); else x.lineTo(px,py); }
      x.stroke(); x.fillStyle="#e0a96a";
      for(i=0;i<series.length;i++){ x.beginPath(); x.arc(PX(series[i].t),PY(series[i].temp),2.5,0,6.3); x.fill(); }
    } else if(past.length===0){ x.fillStyle="#6b5947"; x.fillText("温度を記録すると曲線が出ます",padL+8,padT+pH/2); }
  }

  /* ---- 豆名変更時：過去カーブの有無でヒント表示＋グラフ再描画 ---- */
  function onBeanChange(){
    var hint=$("beanHint");
    if(hint){ hint.style.display=(pastCurves().length>0)?"block":"none"; }
    drawGraph();
  }

  /* ---- 初期化 ---- */
  setupChips("procChips",function(v){selProc=v;$("procOther").style.display=(v==="その他")?"block":"none";});
  setupChips("heatChips",function(v){selHeat=v;});
  $("startBtn").addEventListener("click",toggleRun);
  $("resetBtn").addEventListener("click",resetAll);
  $("saveBtn").addEventListener("click",saveRoast);
  $("csvBtn").addEventListener("click",exportCSV);
  $("green").addEventListener("input",recalc);
  $("roasted").addEventListener("input",recalc);
  $("p3").addEventListener("click",function(){addTemp(3);});
  $("p5").addEventListener("click",function(){addTemp(5);});
  $("p10").addEventListener("click",function(){addTemp(10);});
  $("pNow").addEventListener("click",function(){recordPoint(parseFloat($("curTemp").value));});
  $("bean").addEventListener("input",onBeanChange);
  $("bean").addEventListener("change",onBeanChange);
  window.addEventListener("resize",drawGraph);
  renderEvents();renderHist();refreshBeanList();recalc();onBeanChange();
})();
</script>
</body>
